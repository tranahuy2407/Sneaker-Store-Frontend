version: '3.8'

services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://sneaker-store-backend.onrender.com/api/v1}
    ports:
      - "3000:80"
    container_name: sneaker-frontend
    restart: unless-stopped
